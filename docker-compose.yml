name: dagrd-api

services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL database
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dagrd-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dagrd_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # FastAPI application
  # ──────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: dagrd-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dagrd_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Development: mount source code for hot-reload (uncomment for local dev)
    # volumes:
    #   - ./app:/app/app

volumes:
  postgres_data:
    driver: local
